<title>Road to Glory</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%; width: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'Bebas Neue', sans-serif;
}
.screen {
  height: 100vh; height: 100dvh;
  width: 100%;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  position: relative;
  overflow: hidden;
}
.photo-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}
.photo-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
.photo-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0)    0%,
    rgba(0,0,0,0)    28%,
    rgba(0,0,0,0.5)  52%,
    rgba(0,0,0,0.92) 72%,
    #000             88%
  );
}
.red-glow {
  position: absolute;
  bottom: -60px; left: 50%;
  transform: translateX(-50%);
  width: 260px; height: 200px;
  background: radial-gradient(ellipse, rgba(220,30,40,.35) 0%, transparent 70%);
  pointer-events: none;
  z-index: 2;
}
.content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 28px);
  width: 100%;
  text-align: center;
  padding-left: 24px;
  padding-right: 24px;
}
.rule {
  width: 48px; height: 2px;
  background: #FF2233;
  margin-bottom: 16px;
  animation: ruleIn 1s ease both;
}
@keyframes ruleIn { from { width:0; opacity:0; } to { width:48px; opacity:1; } }
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 13vw, 72px);
  letter-spacing: 6px;
  line-height: .95;
  color: #FF2233;
  text-shadow: 0 0 40px rgba(255,30,50,.5), 0 2px 0 rgba(0,0,0,.8);
  animation: fadeUp .9s cubic-bezier(.2,0,.2,1) .15s both;
}
.subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 5px;
  color: #555;
  text-transform: uppercase;
  margin-top: 10px;
  animation: fadeUp .9s cubic-bezier(.2,0,.2,1) .3s both;
}
.names {
  display: flex;
  gap: 16px;
  margin-top: 24px;
  animation: fadeUp .9s cubic-bezier(.2,0,.2,1) .45s both;
}
.name-tag {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border: 1px solid #1e1e1e;
  border-radius: 6px;
  background: rgba(255,255,255,.03);
}
.name-dot { width: 6px; height: 6px; border-radius: 50%; }
.name-dot.red  { background: #FF2233; box-shadow: 0 0 6px #FF2233; }
.name-dot.blue { background: #00C2FF; box-shadow: 0 0 6px #00C2FF; }
.name-text {
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: 2px;
  color: #888; text-transform: uppercase;
}
.enter-btn {
  margin-top: 28px;
  padding: 16px 40px;
  background: #FF2233;
  border: none; border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 4px;
  color: #fff;
  cursor: pointer;
  transition: all .15s;
  animation: fadeUp .9s cubic-bezier(.2,0,.2,1) .6s both;
  -webkit-appearance: none;
  box-shadow: 0 4px 30px rgba(255,34,51,.3);
  width: 100%; max-width: 320px;
}
.enter-btn:active { transform: scale(.97); background: #d41e2c; }
.scanlines {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px
  );
}
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
</style>
