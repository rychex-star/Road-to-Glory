<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Stats — Road to Glory</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:#0c0c0c; color:#f2f2f2; font-family:'DM Sans',sans-serif; overscroll-behavior:none; }

:root {
  --bg:     #0c0c0c;
  --card:   #141414;
  --line:   #242424;
  --muted:  #666;
  --faint:  #333;
  --red:    #FF4655;
  --blue:   #00C2FF;
  --gold:   #FFD166;
  --green:  #2EC4B6;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}

#app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* TOPBAR */
.topbar {
  flex-shrink:0;
  display:flex; align-items:center; gap:14px;
  padding: calc(var(--st) + 14px) 18px 12px;
  background:var(--bg); border-bottom:1px solid var(--line);
}
.back-btn {
  background:var(--card); border:1px solid var(--line);
  border-radius:10px; width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  color:var(--muted); font-size:18px; cursor:pointer;
  flex-shrink:0; -webkit-appearance:none;
}
.back-btn:active { opacity:.6; }
.topbar-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px; flex:1; }
.user-toggle {
  display:flex; gap:0;
  background:var(--card); border:1px solid var(--line);
  border-radius:10px; overflow:hidden;
}
.utbtn {
  padding:8px 14px;
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  border:none; background:transparent; color:var(--muted);
  cursor:pointer; transition:all .15s; -webkit-appearance:none;
}
.utbtn.active { color:#000; }
.utbtn.active.u1 { background:var(--red); }
.utbtn.active.u2 { background:var(--blue); }

/* SCROLL */
.scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:20px 16px calc(var(--sb)+20px); }

/* SECTION TITLE */
.sec-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:14px; letter-spacing:4px; color:var(--muted);
  text-transform:uppercase; margin:24px 0 10px;
}
.sec-title:first-child { margin-top:0; }

/* STAT GRID */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
.stat-box {
  background:var(--card); border:1px solid var(--line);
  border-radius:14px; padding:16px; text-align:center;
}
.stat-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:38px; letter-spacing:2px; line-height:1;
}
.stat-lbl {
  font-family:'DM Mono',monospace;
  font-size:8px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-top:5px;
}

/* PR LIST */
.pr-list { display:flex; flex-direction:column; gap:8px; }
.pr-row {
  background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.pr-left {}
.pr-name { font-size:13px; font-weight:700; line-height:1.2; margin-bottom:3px; }
.pr-day  { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
.pr-right { display:flex; flex-direction:column; align-items:flex-end; gap:2px; flex-shrink:0; }
.pr-val  { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; line-height:1; }
.pr-unit { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); }

/* DAY SUMMARY */
.day-rows { display:flex; flex-direction:column; gap:8px; }
.day-row {
  background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:13px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.day-label { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; }
.day-type  { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
.day-stats { text-align:right; }
.day-vol   { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; }
.day-sets  { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; margin-top:2px; }

/* COMPARE */
.compare-row {
  background:var(--card); border:1px solid var(--line);
  border-radius:12px; overflow:hidden; margin-bottom:8px;
}
.compare-top {
  padding:12px 16px 8px;
  font-size:13px; font-weight:700;
  border-bottom:1px solid var(--line);
}
.compare-bars { padding:12px 16px 14px; display:flex; flex-direction:column; gap:8px; }
.cbar-row { display:flex; flex-direction:column; gap:4px; }
.cbar-meta { display:flex; justify-content:space-between; align-items:center; }
.cbar-name { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; }
.cbar-val  { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; }
.cbar-track { height:6px; background:var(--faint); border-radius:3px; overflow:hidden; }
.cbar-fill  { height:100%; border-radius:3px; transition:width .6s cubic-bezier(.4,0,.2,1); }

/* EMPTY STATE */
.empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:60px 28px; text-align:center; gap:12px;
}
.empty-icon { font-size:48px; opacity:.2; }
.empty-txt  { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; line-height:1.8; }
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="topbar-title">MY STATS</div>
    <div class="user-toggle">
      <button class="utbtn u1 active" id="utb0" onclick="setUser(0)">Abdulhadi</button>
      <button class="utbtn u2"        id="utb1" onclick="setUser(1)">Abdullah</button>
    </div>
  </div>

  <div class="scroll" id="scroll"></div>

</div>

<script>
// ── Same program data as workout.html ──
const PROG = [
  { day:1, wd:'Saturday',  type:'HEAVY',    col:'#FF4655',
    exs:[{n:'Smith Machine Squat',s:4},{n:'Chest Press Machine',s:4},{n:'Lat Pulldown',s:4},{n:'Romanian Deadlift',s:3},{n:'Shoulder Press Machine',s:3},{n:'Seated Leg Curl',s:3}]},
  { day:2, wd:'Sunday',    type:'VOLUME',   col:'#4D7AFF',
    exs:[{n:'Hack Squat',s:4},{n:'Incline Chest Press',s:4},{n:'Seated Cable Row',s:4},{n:'Leg Extension',s:3},{n:'Lateral Raises',s:4},{n:'Triceps Pushdown',s:3},{n:'Biceps Curl Machine',s:3}]},
  { day:3, wd:'Monday',    type:'PUMP',     col:'#FF9F45',
    exs:[{n:'Leg Press',s:3},{n:'Pec Deck',s:3},{n:'Straight Arm Pulldown',s:3},{n:'Cable Row (Light)',s:3},{n:'Lateral Raises',s:3},{n:'Arm Superset — Biceps',s:3},{n:'Arm Superset — Triceps',s:3}]},
  { day:4, wd:'Tuesday',   type:'HEAVY',    col:'#FF4655',
    exs:[{n:'Hack Squat (Heavy)',s:4},{n:'Flat Chest Press',s:4},{n:'Close Grip Lat Pulldown',s:4},{n:'Romanian Deadlift',s:3},{n:'Shoulder Press',s:3},{n:'Leg Curl',s:3}]},
  { day:5, wd:'Wednesday', type:'VOLUME',   col:'#4D7AFF',
    exs:[{n:'Bulgarian Split Squat (Smith)',s:3},{n:'Pec Deck',s:4},{n:'Single Arm Cable Row',s:4},{n:'Leg Extension',s:3},{n:'Lateral Raises',s:4},{n:'Rope Triceps Pushdown',s:3},{n:'Dumbbell Curl',s:3}]},
  { day:6, wd:'Thursday',  type:'ATHLETIC', col:'#A855F7',
    exs:[{n:'Leg Press (Moderate)',s:4},{n:'Incline Chest Press',s:3},{n:'Lat Pulldown',s:3},{n:'Walking Lunges (Light DB/Smith)',s:3},{n:'Shoulder Lateral Raises',s:3}]},
];

const KEY = 'iron_v10';
let DB = JSON.parse(localStorage.getItem(KEY) || '{}');
const getW = (d,e,s,u) => parseFloat(DB[`${d}_${e}_${s}_${u}`]) || 0;

let activeUser = 0;

function setUser(u) {
  activeUser = u;
  document.querySelectorAll('.utbtn').forEach((b,i) => {
    b.classList.toggle('active', i === u);
  });
  render();
}

function render() {
  const u = activeUser;
  const col = u === 0 ? 'var(--red)' : 'var(--blue)';

  // ── Gather all data ──
  let totalSets = 0, totalVol = 0;
  const prs = []; // { name, best, day }
  const dayData = []; // per day stats

  PROG.forEach((d, di) => {
    let daySets = 0, dayVol = 0;
    d.exs.forEach((ex, ei) => {
      let exBest = 0;
      for (let si = 0; si < ex.s; si++) {
        const w = getW(d.day, ei, si, u);
        if (w > 0) {
          daySets++;
          dayVol += w;
          if (w > exBest) exBest = w;
        }
      }
      if (exBest > 0) prs.push({ name: ex.n, best: exBest, day: d.type, col: d.col });
    });
    totalSets += daySets;
    totalVol  += dayVol;
    if (daySets > 0) dayData.push({ d, daySets, dayVol });
  });

  // Sort PRs by weight desc
  prs.sort((a, b) => b.best - a.best);

  // ── Compare data (both users) ──
  const bothVol  = [0, 0];
  const bothSets = [0, 0];
  const exCompare = {}; // name → [best_u0, best_u1]

  PROG.forEach((d, di) => {
    d.exs.forEach((ex, ei) => {
      if (!exCompare[ex.n]) exCompare[ex.n] = [0, 0];
      [0, 1].forEach(uu => {
        let best = 0;
        for (let si = 0; si < ex.s; si++) {
          const w = getW(d.day, ei, si, uu);
          if (w > best) best = w;
          if (w > 0) { bothSets[uu]++; bothVol[uu] += w; }
        }
        if (best > exCompare[ex.n][uu]) exCompare[ex.n][uu] = best;
      });
    });
  });

  const compareList = Object.entries(exCompare)
    .filter(([, v]) => v[0] > 0 || v[1] > 0)
    .sort((a, b) => Math.max(b[1][0], b[1][1]) - Math.max(a[1][0], a[1][1]));

  const scroll = document.getElementById('scroll');

  if (totalSets === 0) {
    scroll.innerHTML = `<div class="empty">
      <div class="empty-icon">📊</div>
      <div class="empty-txt">No data yet<br>Log some weights first</div>
    </div>`;
    return;
  }

  let html = '';

  // ── OVERVIEW ──
  html += `<div class="sec-title">Overview</div>
  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-val" style="color:${col}">${totalSets}</div>
      <div class="stat-lbl">Total Sets</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:${col}">${totalVol >= 1000 ? (totalVol/1000).toFixed(1)+'k' : totalVol}</div>
      <div class="stat-lbl">Total Volume (kg)</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:${col}">${prs.length}</div>
      <div class="stat-lbl">Exercises Logged</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:${col}">${dayData.length}</div>
      <div class="stat-lbl">Days Done</div>
    </div>
  </div>`;

  // ── PERSONAL RECORDS ──
  if (prs.length > 0) {
    html += `<div class="sec-title">Personal Records 🏆</div>
    <div class="pr-list">
      ${prs.map((pr, i) => `
        <div class="pr-row">
          <div class="pr-left">
            <div class="pr-name">${pr.name}</div>
            <div class="pr-day" style="color:${pr.col}">${pr.day}</div>
          </div>
          <div class="pr-right">
            <div class="pr-val" style="color:${i===0?'var(--gold)':col}">${pr.best}</div>
            <div class="pr-unit">kg</div>
          </div>
        </div>
      `).join('')}
    </div>`;
  }

  // ── BY DAY ──
  if (dayData.length > 0) {
    html += `<div class="sec-title">By Day</div>
    <div class="day-rows">
      ${dayData.map(({ d, daySets, dayVol }) => `
        <div class="day-row">
          <div>
            <div class="day-label" style="color:${d.col}">Day ${d.day} — ${d.wd}</div>
            <div class="day-type" style="color:${d.col}">${d.type}</div>
          </div>
          <div class="day-stats">
            <div class="day-vol" style="color:${col}">${dayVol >= 1000 ? (dayVol/1000).toFixed(1)+'k' : dayVol} <span style="font-size:12px;color:var(--muted)">kg</span></div>
            <div class="day-sets">${daySets} sets logged</div>
          </div>
        </div>
      `).join('')}
    </div>`;
  }

  // ── HEAD TO HEAD ──
  if (compareList.length > 0) {
    html += `<div class="sec-title">Head to Head ⚔️</div>
    <div>
      ${compareList.map(([name, vals]) => {
        const max = Math.max(vals[0], vals[1], 1);
        const w0 = Math.round((vals[0] / max) * 100);
        const w1 = Math.round((vals[1] / max) * 100);
        const winner0 = vals[0] > vals[1];
        const winner1 = vals[1] > vals[0];
        return `<div class="compare-row">
          <div class="compare-top">${name}</div>
          <div class="compare-bars">
            <div class="cbar-row">
              <div class="cbar-meta">
                <span class="cbar-name" style="color:var(--red)">Abdulhadi ${winner0 ? '👑' : ''}</span>
                <span class="cbar-val" style="color:var(--red)">${vals[0] > 0 ? vals[0]+' kg' : '—'}</span>
              </div>
              <div class="cbar-track">
                <div class="cbar-fill" style="width:${w0}%;background:var(--red)"></div>
              </div>
            </div>
            <div class="cbar-row">
              <div class="cbar-meta">
                <span class="cbar-name" style="color:var(--blue)">Abdullah ${winner1 ? '👑' : ''}</span>
                <span class="cbar-val" style="color:var(--blue)">${vals[1] > 0 ? vals[1]+' kg' : '—'}</span>
              </div>
              <div class="cbar-track">
                <div class="cbar-fill" style="width:${w1}%;background:var(--blue)"></div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  scroll.innerHTML = html;
}

render();
</script>
</body>
</html>
